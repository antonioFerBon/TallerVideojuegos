<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Crisol de Hermes — Eonesia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sol: #FF6B0A;
    --sol-pale: #FF9B20;
    --rock: #0D0A07;
    --rock-mid: #1A1410;
    --rock-surface: #211C17;
    --sulfur: #C0843A;
    --sulfur-dim: #6B4A1E;
    --hermes-blue: #7EC8E3;
    --hermes-dim: #2A5F72;
    --text-main: #E8DCC8;
    --text-dim: #8A7A66;
    --border-glow: rgba(192, 132, 58, 0.4);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--rock);
    cursor: default;
  }

  body {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 400;
    position: relative;
  }

  /* === BACKGROUND LAYERS === */

  .bg-sol {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 50% -10%, #FF6B0A 0%, #CC4400 18%, #6B2200 35%, transparent 60%),
      radial-gradient(ellipse 100% 40% at 50% 0%, rgba(255,90,0,0.15) 0%, transparent 50%);
    z-index: 0;
  }

  .bg-atmo {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 20% at 50% 0%, rgba(255,155,32,0.08) 0%, transparent 100%),
      linear-gradient(180deg, transparent 30%, rgba(13,10,7,0.7) 65%, var(--rock) 100%);
    z-index: 1;
  }

  .bg-terrain {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 38%;
    z-index: 2;
    overflow: hidden;
  }

  .bg-terrain svg {
    width: 100%; height: 100%;
    display: block;
  }

  /* cracks overlay */
  .bg-cracks {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(
        97deg,
        transparent 0px, transparent 120px,
        rgba(192,132,58,0.04) 120px, rgba(192,132,58,0.04) 121px
      ),
      repeating-linear-gradient(
        173deg,
        transparent 0px, transparent 90px,
        rgba(192,132,58,0.03) 90px, rgba(192,132,58,0.03) 91px
      );
  }

  /* sulfur vents */
  .vent {
    position: absolute;
    bottom: 32%;
    width: 2px;
    border-radius: 1px;
    animation: ventpulse 3s ease-in-out infinite;
    z-index: 4;
  }
  .vent:nth-child(1) { left: 18%; height: 28px; background: linear-gradient(to top, rgba(192,132,58,0.7), transparent); animation-delay: 0s; }
  .vent:nth-child(2) { left: 31%; height: 18px; background: linear-gradient(to top, rgba(192,132,58,0.5), transparent); animation-delay: 1.1s; }
  .vent:nth-child(3) { left: 67%; height: 24px; background: linear-gradient(to top, rgba(192,132,58,0.6), transparent); animation-delay: 0.6s; }
  .vent:nth-child(4) { left: 82%; height: 16px; background: linear-gradient(to top, rgba(192,132,58,0.4), transparent); animation-delay: 1.8s; }

  @keyframes ventpulse {
    0%, 100% { opacity: 0.3; transform: scaleX(1); }
    50% { opacity: 1; transform: scaleX(1.8); }
  }

  /* === TIMER === */

  .timer-wrap {
    position: absolute;
    top: 24px;
    right: 28px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    opacity: 0;
    animation: fadein 0.8s 0.5s forwards;
  }

  .timer-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .timer-display {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--sol-pale);
    line-height: 1;
    transition: color 0.4s;
    text-shadow: 0 0 20px rgba(255,155,32,0.4);
  }

  .timer-display.urgent {
    color: #FF3B3B;
    text-shadow: 0 0 20px rgba(255,59,59,0.5);
    animation: urgentpulse 0.5s ease-in-out infinite;
  }

  @keyframes urgentpulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .timer-bar {
    width: 80px;
    height: 2px;
    background: rgba(255,155,32,0.15);
    border-radius: 1px;
    overflow: hidden;
  }

  .timer-bar-fill {
    height: 100%;
    width: 100%;
    background: var(--sol-pale);
    border-radius: 1px;
    transform-origin: left;
    transition: background 0.4s;
  }

  /* === PLANET LABEL === */

  .planet-label {
    position: absolute;
    top: 24px;
    left: 28px;
    z-index: 10;
    opacity: 0;
    animation: fadein 0.8s 0.3s forwards;
  }

  .planet-label-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-dim);
    line-height: 1;
    margin-bottom: 3px;
  }

  .planet-label-title {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.12em;
    color: var(--text-main);
    line-height: 1;
    text-shadow: 0 2px 24px rgba(255,107,10,0.3);
  }

  .planet-label-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--sulfur);
    margin-top: 4px;
  }

  /* === HERMES AVATAR === */

  .hermes-wrap {
    position: absolute;
    bottom: 34%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    opacity: 0;
    animation: hermesfadein 1.2s 0.8s cubic-bezier(0.2,0,0.4,1) forwards;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  @keyframes hermesfadein {
    from { opacity: 0; transform: translateX(-50%) translateY(16px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .hermes-glow-ring {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 1.5px solid rgba(126,200,227,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: ringpulse 4s ease-in-out infinite;
  }

  @keyframes ringpulse {
    0%, 100% { border-color: rgba(126,200,227,0.12); box-shadow: 0 0 0 0 transparent; }
    50% { border-color: rgba(126,200,227,0.35); box-shadow: 0 0 24px rgba(126,200,227,0.12); }
  }

  .hermes-outer-ring {
    position: absolute;
    width: 108px;
    height: 108px;
    border-radius: 50%;
    border: 0.5px solid rgba(126,200,227,0.07);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    animation: outerring 6s linear infinite;
  }

  @keyframes outerring {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }

  .hermes-outer-ring::after {
    content: '';
    position: absolute;
    width: 5px; height: 5px;
    background: var(--hermes-blue);
    border-radius: 50%;
    top: -2.5px; left: 50%;
    transform: translateX(-50%);
    opacity: 0.7;
    box-shadow: 0 0 8px var(--hermes-blue);
  }

  .hermes-figure {
    width: 72px;
    height: 72px;
    position: relative;
  }

  .hermes-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 8px rgba(126,200,227,0.25));
    animation: hermesflicker 5s ease-in-out infinite;
  }

  @keyframes hermesflicker {
    0%, 85%, 100% { opacity: 1; filter: drop-shadow(0 0 8px rgba(126,200,227,0.25)); }
    87% { opacity: 0.55; filter: drop-shadow(0 0 2px rgba(126,200,227,0.1)); }
    89% { opacity: 0.9; }
    91% { opacity: 0.4; }
    93% { opacity: 1; }
  }

  .hermes-boots-glow {
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 48px;
    height: 8px;
    background: var(--hermes-blue);
    border-radius: 50%;
    filter: blur(6px);
    opacity: 0.5;
    animation: bootsglow 2s ease-in-out infinite;
  }

  @keyframes bootsglow {
    0%, 100% { opacity: 0.3; width: 40px; }
    50% { opacity: 0.7; width: 56px; }
  }

  .hermes-name {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--hermes-blue);
    text-transform: uppercase;
    margin-top: 10px;
    opacity: 0.8;
    text-shadow: 0 0 12px rgba(126,200,227,0.4);
  }

  .hermes-status {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--sulfur-dim);
    text-transform: uppercase;
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--sulfur);
    animation: statusdot 1.8s ease-in-out infinite;
  }

  @keyframes statusdot {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* === DIALOG BOX === */

  .dialog-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 8;
    padding: 0 24px 28px;
    opacity: 0;
    animation: fadein 0.8s 1.4s forwards;
  }

  .dialog-box {
    max-width: 860px;
    margin: 0 auto;
    background: rgba(13,10,7,0.88);
    border: 1px solid var(--border-glow);
    border-radius: 4px;
    padding: 20px 26px 18px;
    position: relative;
    backdrop-filter: blur(8px);
  }

  .dialog-box::before {
    content: '';
    position: absolute;
    top: -1px; left: 40px; right: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,155,32,0.6), transparent);
  }

  .dialog-box::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 60px; right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(192,132,58,0.3), transparent);
  }

  .dialog-corner {
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--sulfur);
    border-style: solid;
    opacity: 0.6;
  }

  .dialog-corner.tl { top: -1px; left: -1px; border-width: 1.5px 0 0 1.5px; }
  .dialog-corner.tr { top: -1px; right: -1px; border-width: 1.5px 1.5px 0 0; }
  .dialog-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 1.5px 1.5px; }
  .dialog-corner.br { bottom: -1px; right: -1px; border-width: 0 1.5px 1.5px 0; }

  .dialog-speaker {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--hermes-blue);
    margin-bottom: 10px;
    opacity: 0.85;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dialog-speaker::before {
    content: '';
    display: block;
    width: 18px; height: 1px;
    background: var(--hermes-blue);
    opacity: 0.5;
  }

  .dialog-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--text-main);
    letter-spacing: 0.02em;
    min-height: 56px;
  }

  .dialog-cursor {
    display: inline-block;
    width: 2px; height: 18px;
    background: var(--sol-pale);
    margin-left: 2px;
    vertical-align: middle;
    animation: blinkcursor 0.7s step-end infinite;
  }

  @keyframes blinkcursor {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .dialog-cursor.hidden { display: none; }

  /* === CTA BUTTON === */

  .cta-wrap {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .cta-hint {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.5s;
  }

  .cta-hint.visible { opacity: 1; }

  .cta-btn {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--rock);
    background: var(--sol-pale);
    border: none;
    padding: 11px 28px;
    border-radius: 2px;
    cursor: not-allowed;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.5s, transform 0.5s, background 0.2s, color 0.2s;
    position: relative;
    overflow: hidden;
    white-space: nowrap;
  }

  .cta-btn.active {
    cursor: pointer;
    opacity: 1;
    transform: translateY(0);
  }

  .cta-btn.active::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }

  .cta-btn.active:hover {
    background: #FFB84A;
  }

  .cta-btn.active:hover::before {
    background: rgba(255,255,255,0.08);
  }

  .cta-btn.active:active {
    background: #CC8800;
    transform: translateY(1px);
  }

  .cta-btn.urgent-btn {
    animation: btnurgent 0.4s ease-in-out infinite;
  }

  @keyframes btnurgent {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,59,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(255,59,59,0); }
  }

  /* === SCAN LINE === */

  .scanline {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    opacity: 0.4;
  }

  /* === INTRO OVERLAY === */

  .intro-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    background: var(--rock);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    animation: overlayout 0.8s 0.4s cubic-bezier(0.4,0,1,1) forwards;
  }

  @keyframes overlayout {
    from { opacity: 1; }
    to   { opacity: 0; pointer-events: none; }
  }

  .intro-wordmark {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .intro-title {
    font-family: 'Cinzel', serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 0.1em;
    color: var(--text-main);
  }

  /* === END OVERLAY === */

  .end-overlay {
    position: absolute;
    inset: 0;
    z-index: 25;
    background: rgba(13,10,7,0);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: background 1.2s;
  }

  .end-overlay.active {
    background: rgba(13,10,7,0.92);
    pointer-events: all;
  }

  .end-message {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-align: center;
    opacity: 0;
    transition: opacity 0.8s 0.5s;
  }

  .end-overlay.active .end-message { opacity: 1; }

  /* === UTILITY === */

  @keyframes fadein {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
    animation: particlefloat linear infinite;
  }

  @keyframes particlefloat {
    from { transform: translateY(0) translateX(0); opacity: 0.7; }
    to   { transform: translateY(-60px) translateX(var(--dx, 10px)); opacity: 0; }
  }
</style>
</head>
<body>

<div class="intro-overlay">
  <p class="intro-wordmark">Eonesia</p>
  <p class="intro-title">MERCURIO</p>
</div>

<div class="bg-sol"></div>
<div class="bg-atmo"></div>

<div class="bg-terrain">
  <svg viewBox="0 0 1200 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#181210"/>
        <stop offset="100%" stop-color="#0D0A07"/>
      </linearGradient>
    </defs>
    <polygon points="0,200 0,140 80,118 140,128 200,95 280,108 340,82 420,100 500,72 560,88 620,60 700,78 760,55 840,70 900,48 980,65 1050,40 1120,58 1200,44 1200,200" fill="url(#tg)"/>
    <polygon points="0,200 0,155 60,145 130,148 180,138 240,142 300,132 360,135 430,124 510,128 570,118 640,122 720,112 790,116 860,106 940,110 1010,100 1080,104 1150,96 1200,98 1200,200" fill="#100D0A" opacity="0.7"/>
    <line x1="340" y1="82" x2="340" y2="120" stroke="#C0843A" stroke-width="0.5" opacity="0.3"/>
    <line x1="620" y1="60" x2="650" y2="90" stroke="#C0843A" stroke-width="0.5" opacity="0.25"/>
    <line x1="900" y1="48" x2="880" y2="80" stroke="#C0843A" stroke-width="0.5" opacity="0.2"/>
    <line x1="200" y1="95" x2="220" y2="125" stroke="#C0843A" stroke-width="0.5" opacity="0.2"/>
    <line x1="760" y1="55" x2="785" y2="88" stroke="#C0843A" stroke-width="0.5" opacity="0.25"/>
  </svg>
</div>

<div class="bg-cracks"></div>

<div class="vent"></div>
<div class="vent"></div>
<div class="vent"></div>
<div class="vent"></div>

<div class="planet-label">
  <p class="planet-label-name">Primer planeta</p>
  <p class="planet-label-title">MERCURIO</p>
  <p class="planet-label-sub">El Crisol de Hermes</p>
</div>

<div class="timer-wrap">
  <p class="timer-label">Tiempo restante</p>
  <p class="timer-display" id="timerDisplay">40</p>
  <div class="timer-bar"><div class="timer-bar-fill" id="timerFill"></div></div>
</div>

<div class="hermes-wrap" id="hermesWrap">
  <div class="hermes-glow-ring">
    <div class="hermes-outer-ring"></div>
    <div class="hermes-figure">
      <svg class="hermes-svg" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="36" cy="14" r="8" fill="none" stroke="#7EC8E3" stroke-width="1.2" opacity="0.9"/>
        <circle cx="36" cy="14" r="4" fill="#7EC8E3" opacity="0.4"/>
        <line x1="36" y1="22" x2="36" y2="40" stroke="#7EC8E3" stroke-width="1.5" opacity="0.85"/>
        <line x1="36" y1="26" x2="24" y2="35" stroke="#7EC8E3" stroke-width="1.2" opacity="0.7"/>
        <line x1="36" y1="26" x2="48" y2="35" stroke="#7EC8E3" stroke-width="1.2" opacity="0.7"/>
        <line x1="36" y1="40" x2="28" y2="56" stroke="#7EC8E3" stroke-width="1.2" opacity="0.75"/>
        <line x1="36" y1="40" x2="44" y2="56" stroke="#7EC8E3" stroke-width="1.2" opacity="0.75"/>
        <rect x="25" y="54" width="6" height="4" rx="1" fill="#7EC8E3" opacity="0.6"/>
        <rect x="41" y="54" width="6" height="4" rx="1" fill="#7EC8E3" opacity="0.6"/>
        <ellipse cx="26" cy="58" rx="5" ry="2" fill="#7EC8E3" opacity="0.5"/>
        <ellipse cx="46" cy="58" rx="5" ry="2" fill="#7EC8E3" opacity="0.5"/>
        <line x1="20" y1="14" x2="16" y2="10" stroke="#7EC8E3" stroke-width="0.8" opacity="0.4"/>
        <line x1="52" y1="14" x2="56" y2="10" stroke="#7EC8E3" stroke-width="0.8" opacity="0.4"/>
      </svg>
      <div class="hermes-boots-glow"></div>
    </div>
  </div>
  <p class="hermes-name">Hermes</p>
  <p class="hermes-status"><span class="status-dot"></span>Energia inestable</p>
</div>

<div id="particles-host" style="position:absolute;inset:0;pointer-events:none;z-index:4;overflow:hidden;"></div>

<div class="dialog-wrap" id="dialogWrap">
  <div class="dialog-box">
    <div class="dialog-corner tl"></div>
    <div class="dialog-corner tr"></div>
    <div class="dialog-corner bl"></div>
    <div class="dialog-corner br"></div>
    <p class="dialog-speaker">Hermes — El Mensajero</p>
    <p class="dialog-text" id="dialogText"><span class="dialog-cursor" id="dialogCursor"></span></p>
    <div class="cta-wrap">
      <p class="cta-hint" id="ctaHint">El cosmos espera tu respuesta</p>
      <button class="cta-btn" id="ctaBtn" disabled>Equilibrar el cosmos</button>
    </div>
  </div>
</div>

<div class="scanline"></div>

<div class="end-overlay" id="endOverlay">
  <p class="end-message" id="endMessage"></p>
</div>

<script>
const SPEECH = "Mortales... buscais mi Ofrenda, el Mercurio Liquido del Destino, para reparar vuestro hogar. Pero mi planeta es esquivo: es el mas pequeno, el mas cercano al Padre Sol, y sin embargo, el mas rapido. Si no comprendeis vuestro lugar en la escala del universo, el Sol os devorara antes de que podais parpadear. Demostrad que vuestra mente es tan veloz como yo. Equilibrad el cosmos!";

const SPEECH_DISPLAY = "Mortales... buscáis mi Ofrenda, el Mercurio Líquido del Destino, para reparar vuestro hogar. Pero mi planeta es esquivo: es el más pequeño, el más cercano al Padre Sol, y sin embargo, el más rápido. Si no comprendéis vuestro lugar en la escala del universo, el Sol os devorará antes de que podáis parpadear. Demostrad que vuestra mente es tan veloz como yo. ¡Equilibrad el cosmos!";

const TOTAL_TIME = 40;
const TYPE_DURATION_MS = 22000;
const charDelay = TYPE_DURATION_MS / SPEECH_DISPLAY.length;

let timerInterval = null;
let typeInterval = null;
let charIndex = 0;
let timeLeft = TOTAL_TIME;
let ctaActive = false;
let ended = false;

const timerDisplay = document.getElementById('timerDisplay');
const timerFill = document.getElementById('timerFill');
const dialogText = document.getElementById('dialogText');
const dialogCursor = document.getElementById('dialogCursor');
const ctaBtn = document.getElementById('ctaBtn');
const ctaHint = document.getElementById('ctaHint');
const endOverlay = document.getElementById('endOverlay');
const endMessage = document.getElementById('endMessage');

function activateCTA() {
  if (ctaActive) return;
  ctaActive = true;
  dialogCursor.classList.add('hidden');
  ctaBtn.classList.add('active');
  ctaBtn.disabled = false;
  ctaHint.classList.add('visible');
  if (timeLeft <= 10) ctaBtn.classList.add('urgent-btn');
}

function triggerEnd(won) {
  if (ended) return;
  ended = true;
  clearInterval(timerInterval);
  clearInterval(typeInterval);
  endOverlay.classList.add('active');
  if (won) {
    endMessage.innerHTML = 'La mente ha hablado.<br><span style="font-size:13px;letter-spacing:.3em;color:#C0843A;font-family:Rajdhani,sans-serif;font-weight:500">Cargando el puzle...</span>';
  } else {
    endMessage.innerHTML = 'El Sol ha devorado la oportunidad.<br><span style="font-size:13px;letter-spacing:.3em;color:#C0843A;font-family:Rajdhani,sans-serif;font-weight:500">El tiempo se ha agotado</span>';
  }
}

function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    timerDisplay.textContent = timeLeft < 10 ? '0' + timeLeft : timeLeft;
    timerFill.style.transform = 'scaleX(' + (timeLeft / TOTAL_TIME) + ')';

    if (timeLeft <= 10) {
      timerDisplay.classList.add('urgent');
      timerFill.style.background = '#FF3B3B';
      if (ctaActive) ctaBtn.classList.add('urgent-btn');
    }

    if (timeLeft <= 0) {
      triggerEnd(false);
    }
  }, 1000);
}

function typeNextChar() {
  if (charIndex >= SPEECH_DISPLAY.length) {
    clearInterval(typeInterval);
    activateCTA();
    return;
  }
  const current = SPEECH_DISPLAY.slice(0, charIndex + 1);
  dialogText.textContent = current;
  dialogText.appendChild(dialogCursor);
  charIndex++;
}

ctaBtn.addEventListener('click', () => {
  if (ctaActive && !ended) triggerEnd(true);
});

function spawnParticle() {
  const host = document.getElementById('particles-host');
  const p = document.createElement('div');
  p.className = 'particle';
  const size = 1.5 + Math.random() * 2;
  const left = 10 + Math.random() * 80;
  const bottom = 28 + Math.random() * 12;
  const duration = 3 + Math.random() * 4;
  const dx = (Math.random() - 0.5) * 30;
  p.style.cssText = `width:${size}px;height:${size}px;background:rgba(192,132,58,${0.3+Math.random()*0.4});left:${left}%;bottom:${bottom}%;animation-duration:${duration}s;animation-delay:${Math.random()*3}s;--dx:${dx}px;`;
  host.appendChild(p);
  setTimeout(() => p.remove(), (duration + 3) * 1000);
}

setTimeout(() => {
  startTimer();
  typeInterval = setInterval(typeNextChar, charDelay);
  setInterval(spawnParticle, 600);
}, 1200);
</script>
</body>
</html>
