<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Crisol de Hermes - Eonesia Experience</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@0.289.0/dist/umd/lucide.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Share+Tech+Mono&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body { 
            font-family: 'Share Tech Mono', monospace;
            background: radial-gradient(circle at center, #110924 0%, #05020c 100%);
            min-height: 100vh;
            overflow: hidden;
            color: #e2e8f0;
        }
        .title-font {
            font-family: 'Orbitron', sans-serif;
        }
        .space-grid {
            background-image: linear-gradient(rgba(139, 92, 246, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(139, 92, 246, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
        }
        .caduceus-glow {
            filter: drop-shadow(0 0 25px rgba(234, 179, 8, 0.8)) drop-shadow(0 0 50px rgba(234, 179, 8, 0.4));
        }
        .sun-chroma {
            filter: blur(1px) contrast(1.2);
            mix-blend-mode: screen;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Desestructuración segura de librerías globales
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence, useMotionValue, useTransform } = window.Motion;

        // Componente principal del Simulador Táctico de Escala
        const HermesChallenge = () => {
            // Estados de la Gesta y Flujos de Juego
            const [currentPhase, setCurrentPhase] = useState('intro'); // intro, stage1_select, stage2_orbit, failure, success
            const [selectedSphere, setSelectedSphere] = useState(null);
            const [dialRotation, setDialRotation] = useState(0);
            const [isDraggingDial, setIsDraggingDial] = useState(false);
            const [shakeActive, setShakeActive] = useState(false);
            const [errorMessage, setErrorMessage] = useState('');
            const [systemScale, setSystemScale] = useState(1);
            
            // Referencias estructurales
            const dialElementRef = useRef(null);
            const centerPointRef = useRef({ x: 0, y: 0 });

            // Banco de Datos: Esferas de Materia Estelar
            const celestialSpheres = [
                { id: 'jupiter', name: 'Esfera Gigante (Gaseosa)', size: 'large', scale: 2.2, color: 'radial-gradient(circle at 30% 30%, #f59e0b 0%, #b45309 70%, #451a03 100%)', shadow: 'rgba(245, 158, 11, 0.4)', desc: 'Masa colosal. Rompe el equilibrio relativista del sector.' },
                { id: 'tierra', name: 'Esfera Mediana (Rocosa)', size: 'medium', scale: 1.2, color: 'radial-gradient(circle at 30% 30%, #3b82f6 0%, #1d4ed8 60%, #1e3a8a 100%)', shadow: 'rgba(59, 130, 246, 0.4)', desc: 'Tamaño estándar planetario. Demasiado pesada para la corona solar.' },
                { id: 'mercurio', name: 'Esfera Diminuta (Núcleo denso)', size: 'small', scale: 0.5, color: 'radial-gradient(circle at 30% 30%, #94a3b8 0%, #475569 60%, #1e293b 100%)', shadow: 'rgba(148, 163, 184, 0.5)', desc: 'Pequeña, densa y veloz. Capaz de resistir las mareas de gravedad.' }
            ];

            // Inicializar Iconos Lucide
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [currentPhase]);

            // Sistema de Audio Dinámico vía Web Audio API (Cero dependencias externas)
            const triggerSynthAudio = (type) => {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;
                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    if (type === 'success') {
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(330, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.4);
                        gain.gain.setValueAtTime(0.3, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                        osc.start(); osc.stop(ctx.currentTime + 0.5);
                    } else if (type === 'fail') {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(180, ctx.currentTime);
                        osc.frequency.linearRampToValueAtTime(90, ctx.currentTime + 0.3);
                        gain.gain.setValueAtTime(0.4, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                        osc.start(); osc.stop(ctx.currentTime + 0.4);
                    } else if (type === 'click') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(440, ctx.currentTime);
                        gain.gain.setValueAtTime(0.1, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                        osc.start(); osc.stop(ctx.currentTime + 0.06);
                    }
                } catch (e) { console.log('Audio Context muted or blocked'); }
            };

            // Lógica de inserción física en el Proyector de Esferas
            const handleSphereSelection = (sphere) => {
                if (currentPhase !== 'stage1_select') return;
                
                if (sphere.size === 'small') {
                    triggerSynthAudio('success');
                    setSelectedSphere(sphere);
                    setCurrentPhase('stage2_orbit');
                } else {
                    triggerSynthAudio('fail');
                    setShakeActive(true);
                    setErrorMessage(`¡La gravedad colapsa! La ${sphere.name} es gigantesca. El Sol devora la materia excedente.`);
                    const prevPhase = currentPhase;
                    setCurrentPhase('failure');
                    setTimeout(() => {
                        setShakeActive(false);
                        setCurrentPhase(prevPhase);
                    }, 2500);
                }
            };

            // Manejo del Dial de Órbita Holográfico (Cálculo trigonométrico polar)
            const calculateAngleFromEvent = (clientX, clientY) => {
                if (!dialElementRef.current) return 0;
                const rect = dialElementRef.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const dx = clientX - centerX;
                const dy = clientY - centerY;
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                angle = (angle + 90 + 360) % 360; // Normalizar a 0-360 arrancando arriba
                return angle;
            };

            const handleDialStart = (e) => {
                if (currentPhase !== 'stage2_orbit') return;
                setIsDraggingDial(true);
                const touch = e.touches ? e.touches[0] : e;
                const angle = calculateAngleFromEvent(touch.clientX, touch.clientY);
                setDialRotation(angle);
            };

            useEffect(() => {
                const handleGlobalMove = (e) => {
                    if (!isDraggingDial || currentPhase !== 'stage2_orbit') return;
                    const touch = e.touches ? e.touches[0] : e;
                    const angle = calculateAngleFromEvent(touch.clientX, touch.clientY);
                    setDialRotation(angle);
                    
                    // Efecto de zoom out dinámico según avanza el timón orbital hacia la distancia real
                    const scaleFactor = 1 - (angle / 360) * 0.45;
                    setSystemScale(scaleFactor);

                    // Puntos de paso críticos (Muescas táctiles simuladas por audio corto)
                    if (Math.abs(angle - 144) < 3) triggerSynthAudio('click');
                };

                const handleGlobalUp = () => {
                    if (!isDraggingDial) return;
                    setIsDraggingDial(false);

                    // Verificación matemática del rango de inserción de órbita (144 grados equivale a 0.4 UA en interfaz)
                    // Permitimos un rango de tolerancia pedagógica intuitiva para los alumnos (134° a 154°)
                    if (dialRotation >= 134 && dialRotation <= 154) {
                        triggerSynthAudio('success');
                        setCurrentPhase('success');
                    } else {
                        triggerSynthAudio('fail');
                        setShakeActive(true);
                        if (dialRotation < 134) {
                            setErrorMessage('¡Órbita Demasiado Cercana! El escudo térmico ha fallado bajo la radiación del Padre Sol.');
                        } else {
                            setErrorMessage('¡Órbita Exterior Desconectada! El planeta se pierde errante en el vacío gélido profunda.');
                        }
                        setCurrentPhase('failure');
                        setTimeout(() => {
                            setShakeActive(false);
                            setDialRotation(0);
                            setSystemScale(1);
                            setCurrentPhase('stage2_orbit');
                        }, 3000);
                    }
                };

                window.addEventListener('mousemove', handleGlobalMove);
                window.addEventListener('mouseup', handleGlobalUp);
                window.addEventListener('touchmove', handleGlobalMove, { passive: false });
                window.addEventListener('touchend', handleGlobalUp);

                return () => {
                    window.removeEventListener('mousemove', handleGlobalMove);
                    window.removeEventListener('mouseup', handleGlobalUp);
                    window.removeEventListener('touchmove', handleGlobalMove);
                    window.removeEventListener('touchend', handleGlobalUp);
                };
            }, [isDraggingDial, dialRotation, currentPhase]);

            // Transformación del ángulo visual a Unidades Astronómicas expuestas
            const calculatedUA = ((dialRotation / 360) * 1.0).toFixed(2);

            return (
                <div className="w-full h-screen relative space-grid flex flex-col justify-between overflow-hidden select-none p-4 md:p-6">
                    
                    {/* Hilos de Energía de Fondo Atmosférico */}
                    <div className="absolute inset-0 pointer-events-none overflow-hidden z-0">
                        <div className="absolute top-1/2 left-0 w-[500px] h-[500px] bg-amber-600/10 rounded-full blur-[120px] transform -translate-y-1/2 -translate-x-1/3" />
                        <div className="absolute bottom-0 right-0 w-[600px] h-[600px] bg-violet-900/20 rounded-full blur-[160px]" />
                        {currentPhase === 'stage2_orbit' && (
                            <div className="absolute inset-0 bg-cyan-500/[0.01] animate-pulse" />
                        )}
                    </div>

                    {/* CABECERA DE CONTROL DE NAVEGACIÓN INTERESTELAR */}
                    <header className="relative z-10 w-full flex flex-col sm:flex-row justify-between items-center bg-black/40 border border-violet-500/20 backdrop-blur-md p-4 rounded-xl shadow-2xl">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 border-2 border-amber-400 rounded-lg flex items-center justify-center font-bold text-amber-400 text-xl shadow-[0_0_15px_rgba(251,191,36,0.3)]">
                                ☤
                            </div>
                            <div>
                                <h1 className="title-font text-lg md:text-xl font-black tracking-wider bg-gradient-to-r from-amber-400 via-orange-400 to-violet-400 bg-clip-text text-transparent">
                                    EL CRISOL DE HERMES
                                </h1>
                                <p className="text-xs text-violet-400 tracking-widest uppercase font-semibold">Balanza de las Sombras Cósmicas • Escala CMN.3.C.1.1</p>
                            </div>
                        </div>
                        
                        {/* Monitor de Estado en Tiempo Real */}
                        <div className="mt-2 sm:mt-0 flex items-center gap-4 bg-purple-950/40 px-4 py-2 border border-purple-500/30 rounded-lg text-xs">
                            <div className="flex items-center gap-2">
                                <span className="relative flex h-2 w-2">
                                    <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${currentPhase === 'success' ? 'bg-emerald-400' : 'bg-cyan-400'}`}></span>
                                    <span className={`relative inline-flex rounded-full h-2 w-2 ${currentPhase === 'success' ? 'bg-emerald-500' : 'bg-cyan-500'}`}></span>
                                </span>
                                <span className="text-slate-400">SISTEMA:</span>
                                <span className="text-cyan-300 font-bold uppercase">
                                    {currentPhase === 'intro' && 'Alineando Transmisor'}
                                    {currentPhase === 'stage1_select' && 'Tolva de Masa Requerida'}
                                    {currentPhase === 'stage2_orbit' && 'Cálculo de Perihelio'}
                                    {currentPhase === 'failure' && 'Falla Gravitatoria'}
                                    {currentPhase === 'success' && 'Estable'}
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* ÁREA CENTRAL: PROYECTOR HOLOGRÁFICO DINÁMICO */}
                    <main className="relative z-10 my-4 flex-1 w-full grid grid-cols-1 lg:grid-cols-4 gap-6 items-center">
                        
                        {/* Panel de Guía Táctica Izquierdo */}
                        <div className="lg:col-span-1 h-full flex flex-col justify-between gap-4">
                            <div className="bg-black/50 border border-violet-500/30 rounded-xl p-4 h-full flex flex-col justify-between backdrop-blur-sm">
                                <div>
                                    <div className="flex items-center gap-2 text-amber-400 text-xs font-bold mb-2 uppercase tracking-wider">
                                        <i data-lucide="terminal" className="w-4 h-4"></i>
                                        Mensaje del Mensajero
                                    </div>
                                    <div className="border-l-2 border-amber-500 pl-3 py-1 text-slate-300 text-xs leading-relaxed italic">
                                        {currentPhase === 'intro' && '"Mi planeta es esquivo: el más pequeño, el más cercano al Padre Sol y, sin embargo, el más rápido. Equilibrad el cosmos mortales o seréis ceniza."'}
                                        {currentPhase === 'stage1_select' && '"Observad el gigantismo del Sol Padre. Buscad en vuestra Tolva la materia precisa que mantenga la proporción cósmica exacta sin colapsar por peso."'}
                                        {currentPhase === 'stage2_orbit' && '"¡Bien! La masa es correcta. Ahora comandad el timón orbital de bronce. Fijad el rumbo exacto a 0.4 UA antes de que la radiación solar os calcine."'}
                                        {currentPhase === 'failure' && '"¡Insensatos! La arrogancia espacial distorsiona las órbitas. Vuestra escala matemática se ha desmoronado ante las fuerzas del crisol."'}
                                        {currentPhase === 'success' && '"¡Espléndido, mentes veloces! Habéis entendido que en mi reino la pequeñez es el motor de la máxima velocidad. Recibid la Ofrenda."'}
                                    </div>
                                </div>

                                {/* Vector Informativo de Ayuda Visual */}
                                <div className="mt-4 bg-purple-950/30 border border-purple-500/20 rounded-lg p-3">
                                    <div className="text-[11px] text-purple-400 uppercase font-bold mb-1">Métrica del Sistema</div>
                                    <div className="text-xs text-slate-400">Mercurio posee una escala dimensional equivalente a casi <strong className="text-amber-300">1/3 de la Tierra</strong>. Se sitúa en la muesca de proximidad de <strong className="text-cyan-300">0.4 UA</strong> del Sol.</div>
                                </div>
                            </div>
                        </div>

                        {/* El Escenario del Universo (Holograma 3D Interactivo) */}
                        <div className={`lg:col-span-2 h-full min-h-[300px] bg-black/30 rounded-2xl border ${shakeActive ? 'border-red-500/50' : 'border-violet-500/20'} relative flex items-center justify-center overflow-hidden backdrop-blur-sm`}>
                            
                            {/* Retícula de Medición de UA */}
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-40">
                                <div className="w-1/3 h-1/3 border border-dashed border-cyan-500/20 rounded-full" />
                                <div className="w-2/3 h-2/3 border border-dashed border-cyan-500/30 rounded-full flex items-end justify-center pb-2 text-[9px] text-cyan-400">Órbita Objetivo (0.4 UA)</div>
                                <div className="w-full h-full border border-dashed border-violet-500/10 rounded-full" />
                            </div>

                            <motion.div 
                                className="w-full h-full flex items-center justify-start px-8 md:px-16 gap-16 relative"
                                animate={shakeActive ? { x: [-12, 12, -8, 8, 0] } : {}}
                                transition={{ duration: 0.4 }}
                                style={{ scale: systemScale }}
                            >
                                {/* EL SOL PADRE (Gigantesco a la izquierda) */}
                                <div className="relative flex-shrink-0 z-10">
                                    <motion.div 
                                        className="w-48 h-48 md:w-64 md:h-64 rounded-full bg-gradient-to-r from-amber-400 via-orange-500 to-red-600 shadow-[0_0_80px_rgba(249,115,22,0.6),inset_0_0_40px_rgba(220,38,38,0.8)] relative overflow-hidden sun-chroma"
                                        animate={{ rotate: 360 }}
                                        transition={{ duration: 40, repeat: Infinity, ease: 'linear' }}
                                    >
                                        {/* Detalle de Llamaradas Solares */}
                                        <div className="absolute top-1/4 left-1/4 w-full h-full bg-radial-gradient from-yellow-300 to-transparent opacity-30 animate-pulse" />
                                    </motion.div>
                                    <div className="absolute -bottom-6 left-1/2 transform -translate-x-1/2 text-[10px] tracking-widest text-orange-400 bg-orange-950/80 px-2 py-0.5 border border-orange-500/30 rounded font-bold uppercase">Sol Padre</div>
                                </div>

                                {/* LÍNEA COAXIAL DE ÓRBITA DINÁMICA */}
                                {currentPhase === 'stage2_orbit' && (
                                    <div 
                                        className="absolute top-1/2 left-[160px] md:left-[210px] h-[2px] bg-gradient-to-r from-orange-500 via-cyan-400 to-transparent z-0 origin-left"
                                        style={{ 
                                            width: `${100 + (dialRotation / 360) * 200}px`,
                                            transform: `rotate(${dialRotation - 90}deg)`,
                                            transition: isDraggingDial ? 'none' : 'width 0.3s ease, transform 0.1s linear'
                                        }}
                                    />
                                )}

                                {/* RANURA DE ENCAJE / PLANETA MERCURIO */}
                                <div className="relative flex-shrink-0 flex items-center justify-center z-10">
                                    <AnimatePresence mode="wait">
                                        {!selectedSphere ? (
                                            <motion.div 
                                                key="slot-empty"
                                                className={`w-24 h-24 rounded-full border-2 border-dashed ${currentPhase === 'stage1_select' ? 'border-cyan-400 animate-pulse bg-cyan-950/20' : 'border-slate-600 bg-slate-950/10'} flex flex-col items-center justify-center text-center p-2`}
                                                whileHover={{ scale: 1.05 }}
                                            >
                                                <i data-lucide="plus-circle" className="w-5 h-5 text-cyan-400 mb-1"></i>
                                                <span className="text-[10px] tracking-tight uppercase font-bold text-slate-400">Ranura Mercurio</span>
                                            </motion.div>
                                        ) : (
                                            <motion.div
                                                key="slot-filled"
                                                initial={{ scale: 0, rotate: -180 }}
                                                animate={{ scale: 1, rotate: 0 }}
                                                className="relative flex items-center justify-center"
                                            >
                                                {/* Esfera encajada en su órbita actual */}
                                                <div 
                                                    className="rounded-full shadow-2xl relative"
                                                    style={{
                                                        width: `${60 * selectedSphere.scale}px`,
                                                        height: `${60 * selectedSphere.scale}px`,
                                                        background: selectedSphere.color,
                                                        boxShadow: `0 0 30px ${selectedSphere.shadow}`
                                                    }}
                                                >
                                                    {/* Atmósfera simulada */}
                                                    <div className="absolute inset-0 rounded-full border border-white/20" />
                                                </div>

                                                {/* Indicador de Distancia Real Vinculado */}
                                                <div className="absolute -bottom-8 bg-slate-900/90 border border-cyan-400/50 px-2 py-0.5 rounded text-[10px] font-bold text-cyan-400 shadow-lg whitespace-nowrap">
                                                    D: {calculatedUA} UA
                                                </div>
                                            </motion.div>
                                        )}
                                    </AnimatePresence>
                                </div>
                            </motion.div>

                            {/* Alerta de Feedback por Error de Escala o Posición */}
                            <AnimatePresence>
                                {currentPhase === 'failure' && (
                                    <motion.div 
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        exit={{ opacity: 0, y: -20 }}
                                        className="absolute inset-x-4 bottom-4 bg-red-950/90 border-2 border-red-500 rounded-xl p-4 flex items-center gap-3 shadow-2xl z-30 backdrop-blur-md"
                                    >
                                        <div className="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center text-red-400 flex-shrink-0 animate-bounce">
                                            <i data-lucide="shield-alert" className="w-6 h-6"></i>
                                        </div>
                                        <div>
                                            <h4 className="text-sm font-bold text-red-400 uppercase tracking-wide">Eyección de Masa Coronal Activada</h4>
                                            <p className="text-xs text-slate-300 leading-tight mt-0.5">{errorMessage}</p>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>

                        {/* PANEL DE INTERFACES DE TRABAJO (Diales / Tolvas dependientes de la Fase) */}
                        <div className="lg:col-span-1 h-full flex flex-col justify-center">
                            <AnimatePresence mode="wait">
                                
                                {/* FASE INICIAL: INTRODUCCIÓN AL DESAFÍO */}
                                {currentPhase === 'intro' && (
                                    <motion.div 
                                        key="panel-intro"
                                        initial={{ opacity: 0, x: 20 }}
                                        animate={{ opacity: 1, x: 0 }}
                                        exit={{ opacity: 0, x: -20 }}
                                        className="bg-gradient-to-b from-purple-950/60 to-black/80 border border-purple-500/40 rounded-xl p-5 text-center backdrop-blur-sm shadow-xl"
                                    >
                                        <div className="w-12 h-12 rounded-full bg-amber-500/10 flex items-center justify-center mx-auto mb-3 border border-amber-500/30">
                                            <i data-lucide="orbit" className="w-6 h-6 text-amber-400 animate-spin"></i>
                                        </div>
                                        <h3 className="title-font text-md font-bold text-white mb-2 uppercase tracking-wider">Secuencia de Encaje</h3>
                                        <p className="text-xs text-slate-300 leading-relaxed mb-4">
                                            Fase 1: Seleccionar la masa proporcional del planeta.<br/>
                                            Fase 2: Ubicar el timón a la distancia exacta de Mercurio.
                                        </p>
                                        <button 
                                            onClick={() => { triggerSynthAudio('click'); setCurrentPhase('stage1_select'); }}
                                            className="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold text-xs py-3 px-4 rounded-lg tracking-widest uppercase shadow-lg transition-all"
                                        >
                                            Iniciar Dispositivo
                                        </button>
                                    </motion.div>
                                )}

                                {/* FASE 1: TOLVA DE MATERIA ESTELAR (Arrastre / Selección de escala) */}
                                {currentPhase === 'stage1_select' && (
                                    <motion.div 
                                        key="panel-stage1"
                                        initial={{ opacity: 0, x: 20 }}
                                        animate={{ opacity: 1, x: 0 }}
                                        exit={{ opacity: 0, x: -20 }}
                                        className="bg-black/50 border border-cyan-500/30 rounded-xl p-4 flex flex-col gap-3 backdrop-blur-sm"
                                    >
                                        <div className="text-xs font-bold text-cyan-400 uppercase tracking-widest flex items-center gap-1.5 mb-1">
                                            <i data-lucide="package" className="w-4 h-4"></i>
                                            Tolva de Materia Prima
                                        </div>
                                        <p className="text-[11px] text-slate-400 leading-tight">Pulsa sobre la masa de roca que represente la proporción real de Mercurio frente al gran Sol.</p>
                                        
                                        <div className="flex flex-col gap-2 mt-2">
                                            {celestialSpheres.map((sphere) => (
                                                <button
                                                    key={sphere.id}
                                                    onClick={() => handleSphereSelection(sphere)}
                                                    className="w-full bg-slate-900/80 hover:bg-slate-800 border border-slate-700 hover:border-cyan-500/50 p-3 rounded-lg flex items-center gap-3 transition-all text-left group"
                                                >
                                                    <div 
                                                        className="rounded-full flex-shrink-0 transition-transform group-hover:scale-110"
                                                        style={{ 
                                                            width: `${24 * sphere.scale}px`, 
                                                            height: `${24 * sphere.scale}px`, 
                                                            background: sphere.color,
                                                            boxShadow: `0 0 10px ${sphere.shadow}`
                                                        }}
                                                    />
                                                    <div className="flex-1 min-w-0">
                                                        <div className="text-xs font-bold text-slate-200 group-hover:text-cyan-300 truncate">{sphere.name}</div>
                                                        <div className="text-[10px] text-slate-400 truncate">{sphere.desc}</div>
                                                    </div>
                                                </button>
                                            ))}
                                        </div>
                                    </motion.div>
                                )}

                                {/* FASE 2: DIAL DE ÓRBITA HOLOGRÁFICO (Ajuste fino de distancia en UA) */}
                                {currentPhase === 'stage2_orbit' && (
                                    <motion.div 
                                        key="panel-stage2"
                                        initial={{ opacity: 0, x: 20 }}
                                        animate={{ opacity: 1, x: 0 }}
                                        exit={{ opacity: 0, x: -20 }}
                                        className="bg-black/50 border border-amber-500/30 rounded-xl p-4 flex flex-col items-center gap-3 backdrop-blur-sm"
                                    >
                                        <div className="w-full text-xs font-bold text-amber-400 uppercase tracking-widest flex items-center gap-1.5 mb-1">
                                            <i data-lucide="compass" className="w-4 h-4"></i>
                                            Dial de Órbita Analógico
                                        </div>
                                        <p className="w-full text-[11px] text-slate-400 leading-tight text-left">Arrastra o rota el timón táctil de bronce hasta clavar los <strong className="text-amber-300">0.40 UA</strong> requeridos.</p>
                                        
                                        {/* Estructura del Dial Rotatorio Real */}
                                        <div className="relative my-4 flex items-center justify-center">
                                            <div 
                                                ref={dialElementRef}
                                                onMouseDown={handleDialStart}
                                                onTouchStart={handleDialStart}
                                                className={`w-36 h-36 rounded-full border-4 border-amber-700 bg-gradient-to-br from-amber-900 via-stone-900 to-amber-950 flex items-center justify-center relative shadow-2xl ${isDraggingDial ? 'cursor-grabbing scale-105' : 'cursor-grab'} transition-transform`}
                                                style={{ touchAction: 'none' }}
                                            >
                                                {/* Marcas de Muescas de Unidades */}
                                                {[0, 45, 90, 135, 180, 225, 270, 315].map((angle, i) => (
                                                    <div 
                                                        key={i}
                                                        className={`absolute w-0.5 h-2.5 ${angle === 135 || angle === 180 ? 'bg-cyan-400 w-1' : 'bg-amber-600'}`}
                                                        style={{ 
                                                            transform: `rotate(${angle}deg) translateY(-60px)`,
                                                            transformOrigin: 'center center'
                                                        }}
                                                    />
                                                ))}

                                                {/* Aguja de Control de Distancia Estelar */}
                                                <div 
                                                    className="absolute inset-0 flex items-center justify-center"
                                                    style={{ 
                                                        transform: `rotate(${dialRotation}deg)`,
                                                        transition: isDraggingDial ? 'none' : 'transform 0.1s linear'
                                                    }}
                                                >
                                                    <div className="w-1 h-14 bg-gradient-to-b from-cyan-400 to-transparent rounded-full shadow-[0_0_8px_#22d3ee]" />
                                                    <div className="w-2 h-2 rounded-full bg-cyan-300 absolute top-4 shadow-[0_0_10px_#22d3ee]" />
                                                </div>

                                                {/* Núcleo Central */}
                                                <div className="w-10 h-10 rounded-full bg-stone-950 border border-amber-600/40 flex items-center justify-center shadow-inner">
                                                    <div className="text-[10px] text-amber-400 font-bold">{Math.round(dialRotation)}°</div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Indicador de Lectura de Datos Críticos */}
                                        <div className="w-full flex justify-between items-center bg-stone-950/80 px-3 py-2 border border-stone-800 rounded-lg">
                                            <span className="text-[10px] text-slate-400 uppercase">Lectura Telemetría:</span>
                                            <span className={`text-sm font-black ${calculatedUA === '0.40' ? 'text-emerald-400' : 'text-cyan-300'}`}>
                                                {calculatedUA} UA
                                            </span>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>
                    </main>

                    {/* PIE DE PÁGINA: ESTADO DE AVANCE PEDAGÓGICO */}
                    <footer className="relative z-10 w-full bg-black/20 border-t border-violet-500/10 pt-3 flex justify-between items-center text-[11px] text-slate-500">
                        <div>Módulo Interactivo de Astrofísica Básica • Eonesia S.L.</div>
                        <div className="flex items-center gap-2">
                            <span className="w-2 h-2 bg-purple-500 rounded-full animate-pulse" />
                            <span>Revisión de Nivel: Estable</span>
                        </div>
                    </footer>

                    {/* INSERCIÓN DEL CLÍMAX DE VICTORIA ABSOLUTA (Modal de Logro) */}
                    <AnimatePresence>
                        {currentPhase === 'success' && (
                            <motion.div 
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4 overflow-y-auto"
                            >
                                <motion.div 
                                    initial={{ scale: 0.9, y: 50, opacity: 0 }}
                                    animate={{ scale: 1, y: 0, opacity: 1 }}
                                    transition={{ type: 'spring', damping: 20, stiffness: 100 }}
                                    className="bg-gradient-to-b from-stone-900 via-purple-950 to-neutral-950 border-2 border-amber-400 rounded-2xl max-w-lg w-full p-6 md:p-8 text-center shadow-[0_0_60px_rgba(234,179,8,0.25)] relative"
                                >
                                    {/* Arte Vectorial Central: Apertura de Compuerta y Caduceo de Antimateria */}
                                    <div className="relative w-32 h-32 mx-auto mb-6 bg-black/60 rounded-full border-2 border-dashed border-amber-400/40 flex items-center justify-center">
                                        <motion.div 
                                            className="text-6xl text-amber-400 absolute caduceus-glow"
                                            animate={{ y: [-6, 6, -6], rotate: [0, 5, -5, 0] }}
                                            transition={{ duration: 4, repeat: Infinity, ease: 'easeInOut' }}
                                        >
                                            ☤
                                        </motion.div>
                                        
                                        {/* Icono de Candado Desbloqueado Animado */}
                                        <motion.div 
                                            initial={{ scale: 0, opacity: 0 }}
                                            animate={{ scale: 1, opacity: 1 }}
                                            transition={{ delay: 0.5 }}
                                            className="absolute -top-1 -right-1 w-9 h-9 bg-emerald-500 text-black font-black rounded-full flex items-center justify-center text-sm shadow-xl"
                                        >
                                            <i data-lucide="lock-open" className="w-4 h-4 text-black stroke-[3]"></i>
                                        </motion.div>
                                    </div>

                                    {/* Pergamino Estelar de Mérito Pedagógico */}
                                    <h2 className="title-font text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-amber-400 to-yellow-300 tracking-wide uppercase">
                                        ¡NIVEL COMPLETADO!
                                    </h2>
                                    
                                    <div className="my-4 bg-emerald-950/40 border border-emerald-500/30 rounded-xl p-4 text-left">
                                        <div className="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-1 flex items-center gap-1.5">
                                            <i data-lucide="award" className="w-4 h-4"></i>
                                            Logro de Competencia Adquirido
                                        </div>
                                        <p className="text-xs text-slate-200 font-bold leading-tight">
                                            Dominio de la Escala CMN.3.C.1.1 Completado Exitosamente.
                                        </p>
                                        <p className="text-[11px] text-slate-400 mt-2 leading-relaxed">
                                            El alumno ha resuelto empíricamente la correlación de masa y volumen planetario frente al Sol, logrando calibrar la órbita en el perihelio primario a 0.4 Unidades Astronómicas.
                                        </p>
                                    </div>

                                    <p className="text-xs text-slate-300 max-w-sm mx-auto mb-6 italic leading-snug">
                                        "Has comprendido, mortal veloz, que en el reino de Hermes la pequeñez es la clave de la velocidad."
                                    </p>

                                    {/* Botón de Salto del Sistema */}
                                    <motion.button
                                        whileHover={{ scale: 1.03 }}
                                        whileTap={{ scale: 0.98 }}
                                        onClick={() => window.location.reload()}
                                        className="w-full bg-gradient-to-r from-amber-500 via-orange-500 to-yellow-400 hover:from-amber-400 hover:to-yellow-300 text-stone-950 font-black title-font text-xs tracking-widest py-4 px-6 rounded-xl uppercase shadow-[0_10px_20px_rgba(234,179,8,0.3)] transition-all flex items-center justify-center gap-2"
                                    >
                                        Explorar Siguiente Planeta (Venus)
                                        <i data-lucide="arrow-right" className="w-4 h-4 stroke-[3]"></i>
                                    </motion.button>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                </div>
            );
        };

        // Renderizado del nodo raíz
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HermesChallenge />);
    </script>
</body>
</html>
